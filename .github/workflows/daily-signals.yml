name: Daily ETF signals

on:
  schedule:
    # 21:30 UTC ≈ 4:30–5:30pm Toronto depending on DST — after TSX close, weekdays
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Send a test email regardless of signals'
        type: boolean
        default: false

jobs:
  signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run signal engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          TEST_EMAIL: ${{ inputs.test_email }}
        run: node scripts/run-signals.js
